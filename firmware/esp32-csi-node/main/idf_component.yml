## ESP-IDF Managed Component Dependencies (ADR-045)
dependencies:
  ## LVGL graphics library
  lvgl/lvgl:
    version: "~8.3"
    rules:
      - if: "CONFIG_DISPLAY_ENABLE == y"

  ## CST816S capacitive touch driver
  espressif/esp_lcd_touch_cst816s:
    version: "^1.0"
    rules:
      - if: "CONFIG_DISPLAY_ENABLE == y"

  ## LCD touch abstraction
  espressif/esp_lcd_touch:
    version: "^1.0"
    rules:
      - if: "CONFIG_DISPLAY_ENABLE == y"
