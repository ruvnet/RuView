version: 2
updates:
  # Keep all third-party GitHub Actions on verified, pinned commit SHAs.
  # Triggered after RuView issue #442 (Pentesterra/DevGuard report on
  # checkmarx/kics-github-action@master) — see docs/security/issue-442-analysis.md.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # Mobile app npm deps. Includes the @xmldom/xmldom, node-forge, picomatch,
  # and axios advisories that were either flagged in #442 or surfaced by the
  # parallel deep-audit pass.
  - package-ecosystem: npm
    directory: /ui/mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - mobile

  # Desktop UI npm deps (vite advisory etc.).
  - package-ecosystem: npm
    directory: /rust-port/wifi-densepose-rs/crates/wifi-densepose-desktop/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - desktop

  # Python deps used by v1/.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python

  # Rust workspace.
  - package-ecosystem: cargo
    directory: /rust-port/wifi-densepose-rs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
