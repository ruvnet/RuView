name: CI/CD RuView

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:

  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libudev-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-port/wifi-densepose-rs
      - name: Clippy (warnings only)
        working-directory: rust-port/wifi-densepose-rs
        run: cargo clippy --workspace --all-targets 2>&1 | tee clippy-report.txt; exit 0
      - name: Upload clippy report
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report
          path: rust-port/wifi-densepose-rs/clippy-report.txt
      - name: Format check
        working-directory: rust-port/wifi-densepose-rs
        run: cargo fmt --all -- --check || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libudev-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-port/wifi-densepose-rs
      - name: Tests
        working-directory: rust-port/wifi-densepose-rs
        run: cargo test --workspace

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ruview:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ruview:${{ github.sha }}

  release:
    name: Release binarios
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libudev-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        working-directory: rust-port/wifi-densepose-rs
        run: cargo build --workspace --release
      - uses: softprops/action-gh-release@v2
        with:
          files: rust-port/wifi-densepose-rs/target/release/*